# first run with isaac sim.
# did you:
#   change checkpoint_dir?
#   change run_name in logging.wandb.run_name?
#   change logging.tensorboard.log_dir?

experiment:
  seed: 42

data:
  dataset_path: DATASET_PATH_PLACEHOLDER
  isIsaacSim: true
  val_split: 0.2
  batch_size: BATCH_PLACEHOLDER
  num_workers: 8
  offset_ranges: OFFSET_RANGES_PLACEHOLDER  
  background_dir: "backgrounds"
  background_repeats: 3      # Each image gets 3 different backgrounds
  augmentation_repeats: 2    # Each image gets augmented 2 times

model:
  architecture: ARCHITECTURE_PLACEHOLDER
  input_channels: 3
  output_dim: 3

training:
  num_epochs: 500
  learning_rate: 0.0001
  optimizer: Adam
  weight_decay: 0.0
  scheduler_patience: 10
  scheduler_factor: 0.5
  gradient_clip_norm: null
  mixed_precision: false

logging:
  backend: wandb  # options: wandb, tensorboard, both, none
  run_name: RUN_NAME_PLACEHOLDER
  wandb:
    project: visual-servoing
    entity: jeffke613-carnegie-mellon-university
  tensorboard:
    flush_secs: 30
  print_frequency: 20
  save_best_only: true

transforms:
  resize: [224, 224]
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
  augmentation:
    random_horizontal_flip: false
    random_rotation_degrees: 0