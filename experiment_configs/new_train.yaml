# first run with isaac sim.
# did you:
#   change checkpoint_dir?
#   change run_name in logging.wandb.run_name?
#   change logging.tensorboard.log_dir?

device: cuda
experiment:
  seed: 42

logging:
  run_name: new_train

  tqdm: {}
  wandb:
    project: visual-servoing
    entity: jeffke613-carnegie-mellon-university
  diagnostics: {}
  checkpoint:
    dir: checkpoints
    save_every: 10


data:
  dataset_path: datasets/onebox
  isIsaacSim: true
  val_split: 0.2
  batch_size: 4
  num_workers: 4
  offset_ranges: [0.30, 0.3, 0.3]

model:
  architecture: DualStreamCNN
  args:
    input_channels: 3
    output_dim: 3

training:
  distributed: false
  num_epochs: 100
  optimizer:
    name: Adam
    args:
      lr: 0.0001
  scheduler: 
    name: ReduceLROnPlateau
    args: {}

transforms:
  train_pipeline:
    - name: RandomBackgroundComposite
      args:
        background_dir: backgrounds_pngs
    - name: ToDtype
      args:
        dtype: float32
        scale: true
    - name: Resize
      args:
        size: [112, 112]
    - name: Normalize
      args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  eval_pipeline:
    - name: StripAlpha
    - name: ToDtype
      args:
        dtype: float32
        scale: true
    - name: Resize
      args:
        size: [112, 112]
    - name: Normalize
      args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]