# CFC Network training config for model_training_updated/train.py
#
# CFCNetwork requires 224x224 input (hardcoded fc layer: 16*11*11 -> 128)
# Using 112x112 WILL crash with a shape mismatch.
#
# Run:
#   python train.py --config-path experiment_configs/cfc_train.yaml

device: cuda
experiment:
  seed: 42

logging:
  tqdm: {}
  wandb:
    project: visual-servoing
    entity: jeffke613-carnegie-mellon-university
  diagnostics: {}
  checkpoint:
    dir: checkpoints
    save_every: 10

data:
  dataset_path: datasets/onebox
  val_split: 0.2
  batch_size: 32
  num_workers: 16
  offset_ranges: [0.30, 0.30, 0.13]

model:
  architecture: CFCNetwork
  args:
    input_channels: 3
    output_dim: 3
    dropout_rate: 0.1
    sparsity_level: 0.3
    ncp_mode: "default"

training:
  distributed: false
  num_epochs: 300
  optimizer:
    name: Adam
    args:
      lr: 0.0003
  scheduler:
    name: ReduceLROnPlateau
    args:
      mode: min
      patience: 10
      factor: 0.5

transforms:
  train_pipeline:
    - name: RandomBackgroundComposite
      args:
        background_dir: backgrounds_pngs
    - name: ToDtype
      args:
        dtype: float32
        scale: true
    - name: Resize
      args:
        size: [224, 224]
    - name: ColorJitter
      args:
        brightness: 0.1
        contrast: 0.1
        hue: 0.1
        saturation: 0.05
    - name: Normalize
      args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]
  eval_pipeline:
    - name: StripAlpha
    - name: ToDtype
      args:
        dtype: float32
        scale: true
    - name: Resize
      args:
        size: [224, 224]
    - name: Normalize
      args:
        mean: [0.485, 0.456, 0.406]
        std: [0.229, 0.224, 0.225]